<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Perguntas - Conhecimento</title>
    <style>
        /* Estilo Glassmorphism Luxo com Alta Legibilidade */
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #090d16, #110f2c); /* Escurecido levemente para dar mais destaque ao conteúdo */
            color: #ffffff; /* Branco puro para máxima leitura */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            background: rgba(255, 255, 255, 0.05); /* Aumentado um fio a opacidade para isolar o fundo */
            backdrop-filter: blur(16px); /* Aumentado o desfoque para o texto não misturar com o fundo */
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15); /* Borda ligeiramente mais nítida */
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.6); /* Sombra projetada mais forte para dar profundidade */
            text-align: center;
            margin-top: 40px;
            box-sizing: border-box;
        }
        h1 { 
            font-size: 28px; 
            margin-bottom: 25px; 
            color: #38bdf8; 
            text-shadow: 0 2px 8px rgba(56, 189, 248, 0.3); /* Brilho neon sutil para leitura rápida */
        }
        .card { 
            margin: 20px 0; 
            padding: 22px; 
            background: rgba(0, 0, 0, 0.3); /* Fundo do card escurecido para a pergunta 'saltar' aos olhos */
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        #pergunta {
            font-size: 19px;
            line-height: 1.5;
            font-weight: 500;
            color: #ffffff;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
        }
        .btn {
            background: rgba(56, 189, 248, 0.15);
            border: 1px solid #38bdf8;
            color: #38bdf8;
            padding: 14px 24px; /* Botões ligeiramente maiores, ideais para o toque no celular */
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: 0.2s ease;
            width: 100%;
            margin-top: 12px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        .btn:hover, .btn:active { 
            background: #38bdf8; 
            color: #090d16; 
            text-shadow: none;
        }

        /* --- ESTILOS PREMIUM PARA VÍDEO E TRANSIÇÃO COM ALTO CONTRASTE --- */

        /* Tela do Vídeo de Apresentação */
        #tela-intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }
        #video-apresentacao {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .btn-pular {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(0, 0, 0, 0.6); /* Escurecido para sempre aparecer sobre qualquer vídeo */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        /* Tela de Transição de 3 Segundos (Nicho) */
        #tela-transicao {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(6, 9, 16, 0.85); /* Fundo mais denso para dar foco absoluto à imagem e som */
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 9998;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        #tela-transicao.ativa {
            opacity: 1;
            pointer-events: auto;
        }
        #img-nicho {
            max-width: 80%;
            max-height: 45vh;
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transform: scale(0.8);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #tela-transicao.ativa #img-nicho {
            transform: scale(1);
        }
        #nome-nicho {
            font-size: 32px;
            font-weight: 800;
            margin-top: 25px;
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.9);
            letter-spacing: 1px;
        }
        
        /* Layout dos botões de Nicho */
        .grid-nichos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="tela-intro">
        <video id="video-apresentacao" autoplay muted playsinline>
            <source src="videos/apresentacao.mp4" type="video/mp4">
            Seu navegador não suporta vídeos.
        </video>
        <button class="btn-pular" onclick="fecharApresentacao()">Pular Vídeo</button>
    </div>

    <div id="tela-transicao">
        <img id="img-nicho" src="" alt="Imagem do Nicho">
        <div id="nome-nicho"></div>
    </div>

    <audio id="som-nicho" playsinline></audio>

    <div class="container">
        <h1>Mental Quiz</h1>
        
        <div class="grid-nichos">
            <button class="btn" style="border-color: #a78bfa; color: #a78bfa; background: rgba(167, 139, 250, 0.1);" onclick="selecionarNicho('natureza')">Natureza</button>
            <button class="btn" style="border-color: #38bdf8; color: #38bdf8; background: rgba(56, 189, 248, 0.1);" onclick="selecionarNicho('tecnologia')">Tecnologia</button>
            <button class="btn" style="border-color: #f59e0b; color: #f59e0b; background: rgba(245, 158, 11, 0.1);" onclick="selecionarNicho('historia')">História</button>
            <button class="btn" style="border-color: #f43f5e; color: #f43f5e; background: rgba(244, 63, 94, 0.1);" onclick="selecionarNicho('culturapop')">Cultura Pop</button>
        </div>

        <div class="card">
            <p id="pergunta">Selecione um nicho acima para começar o jogo.</p>
            <p id="dica" style="color: #94a3b8; font-style: italic; display: none;"></p>
        </div>
        <button class="btn" onclick="mostrarDica()">Ver Dica</button>
        <button class="btn" style="border-color: #34d399; color: #34d399; background: rgba(52, 211, 153, 0.1);" onclick="mostrarResposta()">Ver Resposta</button>
    </div>

    <script src="index.tecnologia.js"></script>
    <script src="index.natureza.js"></script>
    <script src="index.historia.js"></script>
    <script src="index.culturapop.js"></script>

    <script>
        let perguntasAtuais = [];
        let indicePergunta = 0;

        // Configuração das Mídias de cada Nicho
        const configNichos = {
            natureza: {
                nome: "Natureza",
                imagem: "imagens/nicho-natureza.png",
                som: "sons/natureza.mp3",
                dados: typeof perguntasNatureza !== 'undefined' ? perguntasNatureza : []
            },
            tecnologia: {
                nome: "Tecnologia",
                imagem: "imagens/nicho-tecnologia.png",
                som: "sons/tecnologia.mp3",
                dados: typeof perguntasTecnologia !== 'undefined' ? perguntasTecnologia : []
            },
            historia: {
                nome: "História",
                imagem: "imagens/nicho-historia.png",
                som: "sons/historia.mp3",
                dados: typeof perguntasHistoria !== 'undefined' ? perguntasHistoria : []
            },
            culturapop: {
                nome: "Cultura Pop",
                imagem: "imagens/nicho-culturapop.png",
                som: "sons/culturapop.mp3",
                dados: typeof perguntasCulturaPop !== 'undefined' ? perguntasCulturaPop : []
            }
        };

        // 🎬 Fecha a apresentação inicial (quando o vídeo acaba ou clica em Pular)
        const video = document.getElementById('video-apresentacao');
        const telaIntro = document.getElementById('tela-intro');

        video.onended = function() {
            fecharApresentacao();
        };

        function fecharApresentacao() {
            telaIntro.style.opacity = '0';
            setTimeout(() => {
                telaIntro.style.display = 'none';
                video.pause();
            }, 800);
        }

        // 🖼️ Lógica de Escolha do Nicho com Transição de 3 Segundos
        function selecionarNicho(nichoChave) {
            const nicho = configNichos[nichoChave];
            perguntasAtuais = nicho.dados;
            indicePergunta = 0;

            // 1. Configura os elements da tela de transição
            document.getElementById('img-nicho').src = nicho.imagem;
            document.getElementById('nome-nicho').innerText = nicho.nome;

            // 2. Toca o som do bicho/ambiente correspondente
            const somElemento = document.getElementById('som-nicho');
            somElemento.src = nicho.som;
            somElemento.play().catch(e => console.log("Áudio aguardando clique do usuário."));

            // 3. Mostra a tela de transição (Efeito Glassmorphic ativa)
            const telaTransicao = document.getElementById('tela-transicao');
            telaTransicao.classList.add('ativa');

            // 4. Timer de 3 segundos para sumir e carregar a primeira pergunta
            setTimeout(() => {
                telaTransicao.classList.remove('ativa');
                carregarPergunta();
            }, 3000);
        }

        // Carrega a pergunta na interface
        function carregarPergunta() {
            if (perguntasAtuais.length > 0) {
                const item = perguntasAtuais[indicePergunta];
                document.getElementById('pergunta').innerText = item.p;
                document.getElementById('dica').innerText = item.d;
                document.getElementById('dica').style.display = 'none';
            } else {
                document.getElementById('pergunta').innerText = "Nenhuma pergunta encontrada para este nicho.";
            }
        }

        function mostrarDica() {
            const dica = document.getElementById('dica');
            if (perguntasAtuais.length > 0) {
                dica.style.display = dica.style.display === 'none' ? 'block' : 'none';
            }
        }

        function mostrarResposta() {
            if (perguntasAtuais.length > 0) {
                const item = perguntasAtuais[indicePergunta];
                alert("Resposta correta: " + item.r);
                
                // Avança de pergunta de forma simples para testar
                indicePergunta = (indicePergunta + 1) % perguntasAtuais.length;
                carregarPergunta();
            }
        }
    </script>
</body>
</html>
